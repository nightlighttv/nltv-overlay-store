<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NLTV Animated Logo</title>
  <style>
    :root {
      --bg1: #070b16;
      --bg2: #0d1326;
      --green: #4affb5;
      --purple: #b15dff;
      --white: #f5fbff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 35%, rgba(177, 93, 255, 0.16), transparent 28%),
        radial-gradient(circle at 50% 60%, rgba(74, 255, 181, 0.12), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
    }

    .wrap {
      position: relative;
      width: min(82vw, 720px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 18px rgba(74,255,181,.22));
    }

    .pulse-ring,
    .pulse-ring.two {
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 2px solid rgba(74,255,181,.18);
      box-shadow: 0 0 28px rgba(74,255,181,.12), inset 0 0 28px rgba(177,93,255,.08);
      animation: pulse 2.8s ease-in-out infinite;
    }

    .pulse-ring.two {
      inset: 5%;
      border-color: rgba(177,93,255,.15);
      animation-delay: 1.1s;
    }

    .crest {
      position: relative;
      width: 62%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      transform: rotate(45deg);
      border-radius: 26%;
      background:
        linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
        linear-gradient(135deg, rgba(74,255,181,.16), rgba(177,93,255,.16));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        0 0 28px rgba(74,255,181,.18),
        0 0 52px rgba(177,93,255,.10),
        inset 0 0 24px rgba(255,255,255,.05);
      animation: floaty 4s ease-in-out infinite;
      overflow: hidden;
    }

    .crest::before,
    .crest::after {
      content: "";
      position: absolute;
      inset: -10%;
      background: conic-gradient(from 0deg, transparent, rgba(74,255,181,.22), transparent 38%, rgba(177,93,255,.20), transparent 68%);
      animation: spin 6s linear infinite;
      mix-blend-mode: screen;
    }

    .crest::after {
      animation-direction: reverse;
      animation-duration: 8.5s;
      opacity: .7;
    }

    .inner {
      position: relative;
      width: 82%;
      aspect-ratio: 1 / 1;
      border-radius: 22%;
      background: rgba(8, 12, 22, .78);
      border: 1px solid rgba(255,255,255,.10);
      display: grid;
      place-items: center;
      transform: rotate(-45deg);
      box-shadow: inset 0 0 20px rgba(74,255,181,.08);
      z-index: 2;
    }

    .letters {
      position: relative;
      line-height: .86;
      text-align: center;
      font-weight: 900;
      color: var(--white);
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255,255,255,.15),
        0 0 22px rgba(74,255,181,.20);
      animation: glowText 2.4s ease-in-out infinite;
    }

    .letters .top {
      font-size: clamp(74px, 11vw, 130px);
      letter-spacing: 6px;
    }

    .letters .bottom {
      font-size: clamp(46px, 6vw, 76px);
      letter-spacing: 11px;
      color: transparent;
      background: linear-gradient(90deg, var(--green), var(--purple), var(--green));
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      margin-top: 8px;
    }

    .slashes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .slash {
      position: absolute;
      width: 140%;
      height: 3px;
      left: -20%;
      background: linear-gradient(90deg, transparent, rgba(74,255,181,.75), rgba(177,93,255,.55), transparent);
      box-shadow: 0 0 14px rgba(74,255,181,.45);
      transform: rotate(-28deg);
      opacity: .0;
      animation: sweep 3.6s linear infinite;
    }

    .slash:nth-child(1) { top: 32%; }
    .slash:nth-child(2) { top: 50%; animation-delay: 1.2s; }
    .slash:nth-child(3) { top: 68%; animation-delay: 2.4s; }

    .tag {
      position: absolute;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      color: var(--white);
      font-size: clamp(12px, 1.4vw, 16px);
      letter-spacing: 3px;
      text-transform: uppercase;
      background: rgba(8, 12, 22, .65);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 0 18px rgba(74,255,181,.14);
      backdrop-filter: blur(6px);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(.96); opacity: .5; }
      50% { transform: scale(1.02); opacity: 1; }
    }

    @keyframes floaty {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(-10px); }
    }

    @keyframes glowText {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.18); }
    }

    @keyframes shimmer {
      from { background-position: 0% 50%; }
      to { background-position: 200% 50%; }
    }

    @keyframes sweep {
      0% { transform: translateX(-35%) rotate(-28deg); opacity: 0; }
      18% { opacity: .95; }
      40% { opacity: .55; }
      60% { opacity: 0; }
      100% { transform: translateX(35%) rotate(-28deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring two"></div>

    <div class="crest">
      <div class="inner">
        <div class="letters">
          <div class="top">NL</div>
          <div class="bottom">TV</div>
        </div>
      </div>
      <div class="slashes">
        <div class="slash"></div>
        <div class="slash"></div>
        <div class="slash"></div>
      </div>
    </div>

    <div class="tag">NightLightTV</div>
  </div>
</body>
</html>
